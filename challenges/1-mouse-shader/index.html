<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sample HTML Page</title>
</head>
<body>
  <div class="bg"></div>

  <div class="scene">
    <nav>
      <div class="logos">
        <p>Soft Horizon</p>
      </div>

      <div class="nav-items">
        <p>Product</p>
        <p>Concept</p>
        <p>Partners</p>
        <button>Try now</button>
      </div>
    </nav>

    <h1 class="hero-title">Need a little sun?!</h1>

    <footer>
      <div class="footer-links">
        <p>Sign up</p>
        <p>Log in</p>
        <p></p>
      </div>
    </footer>

    <!-- your cursor elements -->
    <div class="cursor-main"></div>
    <div class="cursor-layer" data-size="70" data-speed="0.12"></div>
    <div class="cursor-layer" data-size="110" data-speed="0.07"></div>
    <div class="cursor-layer" data-size="160" data-speed="0.04"></div>
  </div>

  <script src="script.js"></script>

</html>
